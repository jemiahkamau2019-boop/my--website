<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deriv Instant Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            padding: 30px;
            background: #1e293b;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        p {
            color: #cbd5e1;
        }

        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 18px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: #16a34a;
        }

        footer {
            margin-top: 30px;
            padding: 20px;
            color: #94a3b8;
        }
    </style>
</head>
